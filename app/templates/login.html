<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — MedEval</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="brand-icon">⬡</span>
        <span class="auth-brand-name">MedEval</span>
      </div>
      <h1 class="auth-title">Sign in</h1>
      <p class="auth-sub">RLHF Annotation Platform</p>

      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" class="auth-form">
        <div class="auth-field">
          <label class="auth-label">Username</label>
          <input type="text" name="username" class="auth-input" autocomplete="username" required autofocus>
        </div>
        <div class="auth-field">
          <label class="auth-label">Password</label>
          <input type="password" name="password" class="auth-input" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary auth-submit">Sign in →</button>
      </form>

      <p class="auth-switch">No account? <a href="{{ url_for('register') }}" class="auth-link">Register here</a></p>
    </div>
  </div>
</body>
</html>
